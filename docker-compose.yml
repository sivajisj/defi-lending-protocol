version: "3.9"

services:
  contracts:
    build:
      context: .
      dockerfile: docker/contracts.Dockerfile
    container_name: mini-aave-contracts
    volumes:
      - ./contracts:/app/contracts
    ports:
      - "8545:8545"   # ADD THIS
    tty: true

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: mini-aave-frontend
    volumes:
      - ./frontend:/app/frontend
    ports:
      - "3000:3000"
    tty: true